<div class="min-h-screen flex items-start sm:items-center justify-center bg-gray-100 p-3 sm:p-6">

  @if(currentTest(); as test){
    <div class="w-full max-w-xl bg-white rounded-2xl shadow-lg p-4 sm:p-6 space-y-5">

      <!-- Savol -->
      <div class="border-b pb-3 sm:pb-4">
        <h3 class="text-lg sm:text-xl font-semibold text-gray-800 leading-snug">
          {{test.savol}}
        </h3>
      </div>

      <!-- Javoblar -->
     @for(i of test.javob; track i.matn){

  <label
    (click)="selectAnswer(i)"
    class="flex items-start sm:items-center gap-3 p-3 border rounded-xl transition cursor-pointer"
    [ngClass]="{
      'opacity-50 cursor-not-allowed': isLocked && selectedAnswer !== i,

      'border-green-500 bg-green-50': isLocked && selectedAnswer === i && i.correct,
      'border-red-500 bg-red-50': isLocked && selectedAnswer === i && !i.correct
    }"
  >

    <input 
      type="radio" 
      name="answer"
      [disabled]="isLocked"
      class="mt-1 sm:mt-0 w-5 h-5"
    />

    <p class="text-sm sm:text-base">
      {{i.matn}}
    </p>

  </label>

}

      <!-- Tugma -->
      <div class="pt-2 sm:pt-4 flex justify-end">
        <button class="w-full sm:w-auto px-5 py-3 sm:py-2 bg-blue-600 text-white rounded-xl 
                       hover:bg-blue-700 active:scale-[0.98] transition text-sm sm:text-base"
                       (click)="nextQuestion()">
          Keyingi
        </button>
      </div>

    </div>
  }

</div>
